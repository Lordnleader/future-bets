<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Future Bets</title>
    <meta
      name="description"
      content="A quiet interface for exploring directional future bets through patterns, signal overlap, and source-backed briefs."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css?v=ui-pass-2" />
  </head>
  <body>
    <div class="site-shell home-shell" id="home-shell">
      <section class="landing-screen" id="landing-screen" aria-labelledby="landing-heading">
        <div class="landing-screen__scene" id="landing-scene" aria-hidden="true"></div>
        <div class="landing-screen__haze"></div>
        <div class="landing-screen__marks" aria-hidden="true"></div>
        <div class="landing-screen__content">
          <p class="landing-screen__eyebrow" id="landing-heading">Everything exists in patterns</p>
          <button class="landing-screen__button" id="enter-button" type="button">
            Predict the future
          </button>
        </div>
      </section>

      <main class="home-main">
        <section class="workspace" id="workspace" aria-labelledby="workspace-heading">
          <h1 class="sr-only" id="workspace-heading">Future Bets pattern network</h1>

          <div class="workspace__panel workspace__panel--card">
            <div class="selection-shell" id="selection-shell">
              <div id="selection-card"></div>
            </div>
          </div>

          <div class="workspace__panel workspace__panel--network">
            <div class="network-stage" id="network-stage">
              <div class="network-stage__corner network-stage__corner--tl" aria-hidden="true"></div>
              <div class="network-stage__corner network-stage__corner--tr" aria-hidden="true"></div>
              <div class="network-stage__corner network-stage__corner--bl" aria-hidden="true"></div>
              <div class="network-stage__corner network-stage__corner--br" aria-hidden="true"></div>
              <div class="network-stage__haze" aria-hidden="true"></div>
              <div class="network-stage__grain" aria-hidden="true"></div>
              <button class="network-reset" id="reset-button" type="button">Reset</button>

              <div class="network-cluster" id="network-cluster">
                <svg
                  class="network-svg"
                  id="network-svg"
                  viewBox="0 0 1000 760"
                  role="img"
                  aria-label="Interactive pattern network of future bets"
                ></svg>
                <div class="network-labels" id="network-labels"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="report-section" id="report-section" aria-labelledby="report-heading">
          <div class="report-shell">
            <div class="section-label">Full report</div>
            <div class="report-frame">
              <div class="report-frame__intro">
                <h2 id="report-heading">Deeper brief</h2>
              </div>
              <div class="report-content" id="report-content"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./assets/app.js?v=network-restore-5"></script>
  </body>
</html>
